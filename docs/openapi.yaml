openapi: 3.1.0
info:
  title: Todo App API
  version: 1.0.0
  description: |
    REST API para gestionar tareas, subtareas, categorías y tags por usuario.

    **Autenticación:** todas las rutas excepto `register` y `login` exigen un
    header `Authorization: Bearer <token>` emitido por Laravel Sanctum.

    **IDOR cerrado:** cada usuario solo puede acceder a sus propios recursos.
    Intentar leer/modificar uno ajeno devuelve `403 Forbidden`. Hacer una
    petición sin token (o con token inválido) devuelve `401 Unauthorized`.
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Servidor local (php artisan serve)

tags:
  - name: Auth
    description: Registro, login y logout
  - name: Categories
    description: Categorías del usuario
  - name: Tags
    description: Etiquetas del usuario
  - name: Tasks
    description: Tareas del usuario
  - name: Subtasks
    description: Subtareas (anidadas bajo una tarea)

security:
  - sanctum: []

paths:
  /api/register:
    post:
      tags: [Auth]
      summary: Registrar un nuevo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario creado y token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/login:
    post:
      tags: [Auth]
      summary: Login (devuelve un token)
      description: Throttled a 5 intentos por minuto.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: Invalid credentials }
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          description: Demasiados intentos (rate limit)

  /api/logout:
    post:
      tags: [Auth]
      summary: Revocar el token actual
      responses:
        '200':
          description: Token revocado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: Logged out successfully }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/user:
    get:
      tags: [Auth]
      summary: Devolver el usuario autenticado
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/categories:
    get:
      tags: [Categories]
      summary: Listar categorías del usuario (paginado)
      responses:
        '200':
          description: Listado paginado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Categories]
      summary: Crear categoría
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWriteRequest'
      responses:
        '201':
          description: Creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/categories/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Categories]
      summary: Ver categoría
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Categories]
      summary: Actualizar categoría
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWriteRequest'
      responses:
        '200':
          description: Actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Categories]
      summary: Borrar categoría
      responses:
        '204':
          description: Borrada
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/tags:
    get:
      tags: [Tags]
      summary: Listar tags del usuario (paginado)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Tags]
      summary: Crear tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagWriteRequest'
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/tags/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Tags]
      summary: Ver tag
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Tags]
      summary: Actualizar tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagWriteRequest'
      responses:
        '200':
          description: Actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Tags]
      summary: Borrar tag
      responses:
        '204':
          description: Borrado
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/tasks:
    get:
      tags: [Tasks]
      summary: Listar tareas del usuario (paginado, con relaciones cargadas)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Tasks]
      summary: Crear tarea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskWriteRequest'
      responses:
        '201':
          description: Creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Tasks]
      summary: Ver tarea (con category, tags y subtasks)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Tasks]
      summary: Actualizar tarea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskWriteRequest'
      responses:
        '200':
          description: Actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Tasks]
      summary: Borrar tarea
      responses:
        '204':
          description: Borrada
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/tasks/{task}/subtasks:
    parameters:
      - name: task
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Subtasks]
      summary: Listar subtareas de una tarea
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubtaskCollection'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Subtasks]
      summary: Crear subtarea en una tarea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubtaskWriteRequest'
      responses:
        '201':
          description: Creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubtaskEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/subtasks/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      tags: [Subtasks]
      summary: Ver subtarea
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubtaskEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Subtasks]
      summary: Actualizar subtarea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubtaskWriteRequest'
      responses:
        '200':
          description: Actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubtaskEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Subtasks]
      summary: Borrar subtarea
      responses:
        '204':
          description: Borrada
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: PlainTextSanctumToken
      description: |
        Token Bearer emitido por Sanctum (formato `id|hash`).
        Header: `Authorization: Bearer <token>`.

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    Unauthorized:
      description: Falta el token o es inválido
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: Unauthenticated. }
    Forbidden:
      description: El recurso no pertenece al usuario autenticado
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: This action is unauthorized. }
    NotFound:
      description: Recurso no existe
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: 'No query results for model...' }
    ValidationError:
      description: Error de validación
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: 'The given data was invalid.' }
              errors:
                type: object
                additionalProperties:
                  type: array
                  items: { type: string }
              example:
                message: The given data was invalid.
                errors:
                  name: ['The name field is required.']

  schemas:
    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: 'Juan Perez' }
        email: { type: string, format: email, example: juan@example.com }
        email_verified_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name: { type: string, maxLength: 255 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        password_confirmation: { type: string, minLength: 8 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        token: { type: string, example: '1|abc123XYZsanctumtoken...' }

    Category:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: 'Trabajo' }
        color: { type: string, pattern: '^#[0-9a-fA-F]{6}$', example: '#ff0000' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CategoryWriteRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          maxLength: 255
          description: Único dentro de las categorías del usuario.
        color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          example: '#10b981'

    CategoryEnvelope:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Category' }

    CategoryCollection:
      $ref: '#/components/schemas/PaginatedEnvelope'

    Tag:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: 'urgente' }
        color: { type: string, pattern: '^#[0-9a-fA-F]{6}$', example: '#10b981' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TagWriteRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          maxLength: 255
          description: Único dentro de los tags del usuario.
        color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'

    TagEnvelope:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Tag' }

    TagCollection:
      $ref: '#/components/schemas/PaginatedEnvelope'

    Task:
      type: object
      properties:
        id: { type: integer }
        title: { type: string, example: 'Hacer informe' }
        description: { type: string, nullable: true }
        is_completed: { type: boolean }
        category_id: { type: integer, nullable: true }
        status:
          type: string
          enum: [pending, in_progress, completed]
        priority:
          type: string
          enum: [low, medium, high]
        due_date: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        category:
          oneOf:
            - $ref: '#/components/schemas/Category'
            - type: 'null'
          description: Presente solo cuando la relación fue cargada.
        tags:
          type: array
          items: { $ref: '#/components/schemas/Tag' }
        subtasks:
          type: array
          items: { $ref: '#/components/schemas/Subtask' }

    TaskWriteRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        category_id:
          type: integer
          nullable: true
          description: Debe existir y pertenecer al usuario autenticado.
        status:
          type: string
          enum: [pending, in_progress, completed]
        priority:
          type: string
          enum: [low, medium, high]
        due_date: { type: string, format: date-time, nullable: true }
        is_completed: { type: boolean }
        tag_ids:
          type: array
          items: { type: integer }
          description: |
            IDs de tags. Cada uno debe existir y pertenecer al usuario.
            En `PUT`, si está presente, hace `sync()` (reemplaza la lista).

    TaskEnvelope:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Task' }

    TaskCollection:
      $ref: '#/components/schemas/PaginatedEnvelope'

    Subtask:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        is_completed: { type: boolean }
        task_id: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SubtaskWriteRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 255 }
        is_completed: { type: boolean }

    SubtaskEnvelope:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Subtask' }

    SubtaskCollection:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Subtask' }

    PaginatedEnvelope:
      type: object
      description: |
        Envoltorio estándar de `Resource::collection(...)->paginate(...)` de Laravel.
        El campo `data` contiene el array de recursos del tipo correspondiente.
      properties:
        data:
          type: array
          items: { type: object }
        links:
          type: object
          properties:
            first: { type: string, nullable: true }
            last: { type: string, nullable: true }
            prev: { type: string, nullable: true }
            next: { type: string, nullable: true }
        meta:
          type: object
          properties:
            current_page: { type: integer }
            from: { type: integer, nullable: true }
            last_page: { type: integer }
            path: { type: string }
            per_page: { type: integer }
            to: { type: integer, nullable: true }
            total: { type: integer }
